<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מאגר השתלמויות</title>
  <meta name="description" content="מאגר השתלמויות לפי הטבלאות שנמסרו">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="hero compact-hero">
    <div class="hero__glass">
      <h1>מאגר השתלמויות</h1>
      <p>מידע לפי הטבלאות שנמסרו בלבד.</p>
    </div>
  </header>

  <main class="home-only">
    <section class="search-panel">
      <label for="globalSearch">חיפוש בטבלאות</label>
      <input id="globalSearch" type="search" placeholder="חפש לפי תאריך, שעה, נושא, מפגש או מספר השתלמות">
    </section>

    <section class="stats-grid" id="statsGrid"></section>

    <section class="table-section">
      <h2>השתלמויות</h2>
      <div id="trainingsList" class="cards-grid"></div>
    </section>

    <section class="table-section">
      <h2>לוח מפגשים</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>מסלול</th>
              <th>מס׳ מפגש</th>
              <th>תאריך</th>
              <th>יום</th>
              <th>שעות</th>
              <th>שעות אקדמיות</th>
              <th>נושא</th>
            </tr>
          </thead>
          <tbody id="meetingsTable"></tbody>
        </table>
      </div>
    </section>

    <section class="table-section">
      <h2>נתונים חסרים מתוך הטבלאות</h2>
      <div id="missingList" class="cards-grid"></div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
