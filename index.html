<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מאגר השתלמויות</title>
  <meta name="description" content="מאגר השתלמויות לפי הטבלאות שנמסרו">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="main-page">
    <header class="page-header">
      <h1>מאגר השתלמויות</h1>
      <p>מידע לפי הטבלאות שנמסרו בלבד</p>
    </header>

    <section class="search-box">
      <label for="globalSearch">חיפוש בטבלאות</label>
      <input id="globalSearch" type="search" placeholder="חפש תאריך, שעה, נושא, מפגש, תחום או מספר השתלמות">
    </section>

    <section class="summary-grid" id="statsGrid"></section>

    <section class="data-section">
      <h2>טבלת השתלמויות</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>שם השתלמות</th>
              <th>מספר השתלמות</th>
              <th>שנה</th>
              <th>תחום</th>
              <th>מפגשים</th>
              <th>שעות אקדמיות</th>
              <th>תאריך התחלה</th>
              <th>תאריך סיום</th>
              <th>שעות</th>
            </tr>
          </thead>
          <tbody id="trainingsTable"></tbody>
        </table>
      </div>
    </section>

    <section class="data-section">
      <h2>טבלת מפגשים מסודרת לפי תאריך</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>מסלול</th>
              <th>מס׳ מפגש</th>
              <th>תאריך</th>
              <th>יום</th>
              <th>שעות</th>
              <th>שעות אקדמיות</th>
              <th>נושא</th>
            </tr>
          </thead>
          <tbody id="meetingsTable"></tbody>
        </table>
      </div>
    </section>

    <section class="data-section">
      <h2>נתונים חסרים לפי הטבלאות</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>מסלול</th>
              <th>שדה חסר</th>
              <th>סטטוס</th>
              <th>הערה</th>
            </tr>
          </thead>
          <tbody id="missingTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
